name: prism

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata
      POSTGRES_DB: strata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d strata"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: strata
      MINIO_ROOT_PASSWORD: strata-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    image: prism-api
    restart: unless-stopped
    env_file:
      - path: ../apps/api/.env.example
        required: false
      - path: ../apps/api/.env
        required: false
    volumes:
      - parquet_data:/data/parquet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    image: prism-worker
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    env_file:
      - path: ../apps/api/.env.example
        required: false
      - path: ../apps/api/.env
        required: false
    volumes:
      - parquet_data:/data/parquet
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    image: prism-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: ../apps/web/.env.example
        required: false
      - path: ../apps/web/.env
        required: false
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "--tries=1",
          "--timeout=3",
          "http://127.0.0.1:3000/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  parquet_data:
  caddy_data:
  caddy_config:
